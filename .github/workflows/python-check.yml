name: Python Syntax Check

on:
  push:
  pull_request:

jobs:
  py-compile:
    name: Compile pure Python scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python scaffold files
        # Maya-specific maya.cmds tests are intentionally excluded from CI.
        run: python -m py_compile code/*.py
